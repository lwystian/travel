services:
  mysql:
    image: mysql:8.0
    container_name: travel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --lower-case-table-names=1
    volumes:
      - ${TRAVEL_DATA_DIR:-./travel-data}/mysql/data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
      - ./mysql/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - travel-net

  redis:
    image: redis:7.2-alpine
    container_name: travel-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ${TRAVEL_DATA_DIR:-./travel-data}/redis/data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - travel-net

  backend:
    build:
      context: ../springboot
      dockerfile: Dockerfile
    image: travel-backend:${APP_VERSION:-latest}
    container_name: travel-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SPRING_PROFILES_ACTIVE: prod
      LOG_PATH: /app/logs
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_SECURITY_ALLOWED_ORIGINS: ${APP_SECURITY_ALLOWED_ORIGINS}
      APP_SUPER_ADMIN_BOOTSTRAP_ENABLED: ${APP_SUPER_ADMIN_BOOTSTRAP_ENABLED:-true}
      APP_SUPER_ADMIN_USERNAME: ${APP_SUPER_ADMIN_USERNAME:-superadmin}
      APP_SUPER_ADMIN_PHONE: ${APP_SUPER_ADMIN_PHONE}
      APP_SUPER_ADMIN_INITIAL_PASSWORD: ${APP_SUPER_ADMIN_INITIAL_PASSWORD}
      APP_SECURITY_PASSWORD_ENCRYPTION_ENABLED: ${APP_SECURITY_PASSWORD_ENCRYPTION_ENABLED:-true}
      USER_DEFAULT_PASSWORD: ${USER_DEFAULT_PASSWORD}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m}
    volumes:
      - ${TRAVEL_DATA_DIR:-./travel-data}/app/files:/app/files
      - ${TRAVEL_DATA_DIR:-./travel-data}/app/logs:/app/logs
      - ${TRAVEL_DATA_DIR:-./travel-data}/app/backup:/app/backup
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3001/api/monitor/health || exit 1"]
      interval: 20s
      timeout: 6s
      retries: 12
      start_period: 40s
    networks:
      - travel-net

  frontend:
    build:
      context: ../vue3
      dockerfile: Dockerfile
    image: travel-frontend:${APP_VERSION:-latest}
    container_name: travel-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - travel-net

networks:
  travel-net:
    driver: bridge
