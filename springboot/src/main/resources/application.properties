spring.application.name=springboot
spring.config.import=optional:file:./application-local.properties
server.port=3001

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/test?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=false&useSSL=false&serverTimezone=GMT%2b8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

mybatis.configuration.map-underscore-to-camel-case=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=org.example.springboot

knife4j.enable=true
knife4j.setting.language=zh_cn
knife4j.basic.enable=true
knife4j.basic.username=admin
knife4j.basic.password=${KNIFE4J_BASIC_PASSWORD:}

user.defaultPassword=${USER_DEFAULT_PASSWORD:}
app.super-admin.bootstrap-enabled=${APP_SUPER_ADMIN_BOOTSTRAP_ENABLED:false}
app.super-admin.username=${APP_SUPER_ADMIN_USERNAME:superadmin}
app.super-admin.phone=${APP_SUPER_ADMIN_PHONE:}
app.super-admin.initial-password=${APP_SUPER_ADMIN_INITIAL_PASSWORD:}

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
app.upload.image-max-size=${APP_UPLOAD_IMAGE_MAX_SIZE:2MB}

app.security.allowed-origins=${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080,http://localhost:8081,http://127.0.0.1:8081,http://localhost:5173,http://127.0.0.1:5173}
app.security.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.security.allowed-headers=Authorization,Content-Type,token,X-Requested-With,X-CSRF-Token
app.security.origin-check-enabled=true
app.security.sql-injection-check-enabled=true
app.security.xss-protection-enabled=true
app.security.password-encryption-enabled=${APP_SECURITY_PASSWORD_ENCRYPTION_ENABLED:true}
app.security.token-expire=${APP_SECURITY_TOKEN_EXPIRE:2h}
app.seo.public-origin=${APP_SEO_PUBLIC_ORIGIN:}

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=10000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
